<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HP Contabilidade — Criar senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4338ca;
      --bg: #f7f6f3; --border: #e5e3de; --text: #1a1916; --text-secondary: #6b6860;
      --red-bg: #fff0f0; --red-text: #c0392b;
      --green-bg: #edfaf3; --green-text: #1a7a4a;
      --radius: 10px; --radius-lg: 14px;
    }
    body {
      font-family: 'DM Sans', sans-serif; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 2rem;
      background-image: url('https://nacdezqdsouhxgftqaku.supabase.co/storage/v1/object/sign/arquivos/beautiful-shot-snowy-mountain-sunset.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kNmM4ZTIxOC05YTg1LTQxNjEtYTFiNC00YzQ3OWRiNjNiZDAiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJhcnF1aXZvcy9iZWF1dGlmdWwtc2hvdC1zbm93eS1tb3VudGFpbi1zdW5zZXQuanBnIiwiaWF0IjoxNzgwNzEzMzQ0LCJleHAiOjE4MTIyNDkzNDR9.lRu1QYe9mb-3ajTs6g21bOcMkssBl56ubBuCSDk326Y');
      background-size: cover; background-position: center;
    }
    .box { width: 100%; max-width: 380px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.75rem; }
    .logo-icon { width: 44px; height: 44px; background: rgba(67,56,202,0.85); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .logo-name { font-size: 17px; font-weight: 600; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
    .card { background: rgba(255,255,255,0.93); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: var(--radius-lg); padding: 1.75rem; border: 1px solid rgba(255,255,255,0.6); }
    label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: #a8a4f8; background: #fff; }
    .field { margin-bottom: 14px; }
    .btn { width: 100%; padding: 11px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; margin-top: 4px; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 13px; border-radius: var(--radius); padding: 9px 12px; margin-bottom: 12px; }
    .msg-error { background: var(--red-bg); color: var(--red-text); }
    .msg-success { background: var(--green-bg); color: var(--green-text); }
    .msg-info { background: #eef4ff; color: #2d5be3; }
    .hidden { display: none !important; }
    .strength-bar-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-top: 6px; overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 99px; transition: width 0.3s, background 0.3s; width: 0%; }
    .strength-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <span class="logo-name">HP Contabilidade</span>
  </div>

  <div class="card" id="card-loading">
    <div class="msg msg-info">⏳ Verificando acesso...</div>
  </div>

  <div class="card hidden" id="card-form">
    <p style="font-size:15px;font-weight:600;margin-bottom:4px;">Crie sua senha de acesso</p>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:1.25rem;line-height:1.5;">
      Bem-vindo à HP Contabilidade! Defina uma senha para entrar nas próximas vezes.
    </p>
    <div id="msg-error" class="msg msg-error hidden"></div>
    <div class="field">
      <label>Nova senha</label>
      <input type="password" id="pw1" placeholder="Mínimo 8 caracteres" oninput="avaliarSenha()" />
      <div class="strength-bar-wrap"><div class="strength-bar" id="strength-bar"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>
    <div class="field">
      <label>Confirmar senha</label>
      <input type="password" id="pw2" placeholder="Repita a senha" onkeydown="if(event.key==='Enter') salvar()" />
    </div>
    <button class="btn" id="btn-salvar" onclick="salvar()">Salvar senha e entrar</button>
  </div>

  <div class="card hidden" id="card-ok">
    <div class="msg msg-success">✓ Senha criada! Redirecionando para o portal...</div>
  </div>

  <div class="card hidden" id="card-erro">
    <div class="msg msg-error" id="erro-msg">Link inválido ou expirado.</div>
    <p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">Peça ao seu contador um novo convite.</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nacdezqdsouhxgftqaku.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY2RlenFkc291aHhnZnRxYWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODU4MjYsImV4cCI6MjA5NDg2MTgyNn0.C1eqGfu7h-oOC0ibw6hzecPsG49e6IrOXrxu0C-mOSY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { storageKey: 'hp-portal-auth', autoRefreshToken: true, persistSession: true }
});

const params = new URLSearchParams(window.location.search);
const emailParam = params.get('email');
const tmpParam   = params.get('tmp');

function mostrar(id) {
  ['card-loading','card-form','card-ok','card-erro'].forEach(c =>
    document.getElementById(c).classList.toggle('hidden', c !== id)
  );
}

async function init() {
  if (!emailParam || !tmpParam) { mostrar('card-erro'); return; }

  // Login silencioso com a senha temporária que veio na URL
  const { error: loginErr } = await sb.auth.signInWithPassword({
    email: emailParam,
    password: tmpParam
  });

  if (loginErr) {
    document.getElementById('erro-msg').textContent =
      'Acesso inválido. Peça um novo convite ao seu contador.';
    mostrar('card-erro'); return;
  }

  mostrar('card-form');
}

function avaliarSenha() {
  const pw = document.getElementById('pw1').value;
  const bar = document.getElementById('strength-bar');
  const lbl = document.getElementById('strength-label');
  let f = 0;
  if (pw.length >= 8) f++;
  if (/[A-Z]/.test(pw)) f++;
  if (/[0-9]/.test(pw)) f++;
  if (/[^A-Za-z0-9]/.test(pw)) f++;
  const cores  = ['#ef4444','#f59e0b','#3b82f6','#22c55e'];
  const labels = ['Fraca','Razoável','Boa','Forte'];
  const pcts   = ['25%','50%','75%','100%'];
  if (!pw.length) { bar.style.width='0%'; lbl.textContent=''; return; }
  const i = Math.max(0, f-1);
  bar.style.width=pcts[i]; bar.style.background=cores[i]; lbl.textContent=labels[i];
}

async function salvar() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const errEl = document.getElementById('msg-error');
  const btn   = document.getElementById('btn-salvar');
  errEl.classList.add('hidden');

  if (pw1.length < 8) { errEl.textContent='A senha deve ter pelo menos 8 caracteres.'; errEl.classList.remove('hidden'); return; }
  if (pw1 !== pw2)    { errEl.textContent='As senhas não coincidem.'; errEl.classList.remove('hidden'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvando...';

  // Atualizar senha no Supabase Auth
  const { error } = await sb.auth.updateUser({ password: pw1 });
  if (error) {
    errEl.textContent = 'Erro: ' + error.message;
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Salvar senha e entrar'; return;
  }

  // Marcar senha_definida = true e limpar senha_tmp
  await sb.from('clientes').update({
    senha_definida: true,
    senha_tmp: null
  }).eq('email', emailParam);

  mostrar('card-ok');
  setTimeout(() => { window.location.href = '/empresas'; }, 2000);
}

init();
</script>
</body>
</html>
