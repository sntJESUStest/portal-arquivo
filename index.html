<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HP Contabilidade</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4338ca" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="HP Conta" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e5e3de; --border-strong: #ccc9c0;
      --text: #1a1916; --text-secondary: #6b6860; --text-tertiary: #a09d97;
      --accent: #4338ca; --accent-fg: #ffffff;
      --blue-bg: #eef4ff; --blue-text: #2d5be3;
      --green-bg: #edfaf3; --green-text: #1a7a4a;
      --red-bg: #fff0f0; --red-text: #c0392b;
      --radius: 10px; --radius-lg: 14px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
    .hidden { display: none !important; }
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box { width: 100%; max-width: 380px; }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .logo-icon { width: 40px; height: 40px; background: #4338ca; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 20px; height: 20px; stroke: var(--bg); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .logo-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
    label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 500; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus, select:focus { border-color: var(--border-strong); background: #fff; }
    .field { margin-bottom: 14px; }
    .btn { padding: 9px 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; transition: background 0.15s, border-color 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { background: var(--bg); border-color: var(--border-strong); }
    .btn-primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.88; background: var(--accent); }
    .btn-full { width: 100%; justify-content: center; }
    .btn-ghost { border-color: transparent; background: transparent; color: var(--text-secondary); padding: 6px 10px; }
    .btn-ghost:hover { background: var(--bg); color: var(--text); border-color: transparent; }
    .error-msg { font-size: 13px; color: var(--red-text); background: var(--red-bg); border-radius: var(--radius); padding: 8px 12px; margin-bottom: 12px; }
    #main-screen { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .topbar-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--blue-bg); color: var(--blue-text); }
    .content { flex: 1; padding: 2rem; max-width: 860px; margin: 0 auto; width: 100%; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
    .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .upload-card { margin-bottom: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .client-section { margin-bottom: 1rem; }
    .client-header { display: flex; align-items: center; gap: 10px; padding: 10px 0; margin-bottom: 4px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; }
    .client-name { font-weight: 500; font-size: 14px; }
    .client-email { font-size: 12px; color: var(--text-tertiary); }
    .file-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; }
    .file-icon svg { width: 18px; height: 18px; stroke: var(--text-secondary); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .badge-new { background: var(--blue-bg); color: var(--blue-text); }
    .badge-read { background: var(--bg); color: var(--text-tertiary); border: 1px solid var(--border); }
    .badge-setor { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .btn-delete { padding: 5px 8px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text-tertiary); transition: all 0.15s; display: flex; align-items: center; }
    .btn-delete:hover { background: var(--red-bg); color: var(--red-text); border-color: #fca5a5; }
    .btn-delete svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .notif-banner { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; background: var(--green-bg); border: 1px solid #a7f3d0; border-radius: var(--radius); margin-bottom: 8px; font-size: 13px; color: var(--green-text); }
    .notif-icon svg { width: 16px; height: 16px; stroke: var(--green-text); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; margin-top: 1px; flex-shrink: 0; }
    .download-btn { padding: 6px 14px; border-radius: var(--radius); background: var(--accent); color: var(--accent-fg); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 5px; transition: opacity 0.15s; flex-shrink: 0; }
    .download-btn:hover { opacity: 0.85; }
    .download-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-tertiary); font-size: 14px; }
    .loading { text-align: center; padding: 2rem; color: var(--text-tertiary); font-size: 14px; }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    /* ABAS DE SETORES */
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .tab-btn { padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
    .tab-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .tab-btn .tab-count { display: inline-block; margin-left: 5px; background: rgba(255,255,255,0.2); border-radius: 99px; padding: 0 6px; font-size: 11px; }
    .tab-btn:not(.active) .tab-count { background: var(--bg); color: var(--text-tertiary); }

    /* COR POR SETOR */
    .setor-fiscal    { --sc: #e8f4fd; --st: #1565c0; }
    .setor-pessoal   { --sc: #fdf3e8; --st: #b45309; }
    .setor-contabil  { --sc: #f0fdf4; --st: #166534; }
    .setor-financeiro{ --sc: #fdf2f8; --st: #86198f; }
    .setor-avisos    { --sc: #fff7ed; --st: #c2410c; }
    .setor-badge { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; background: var(--sc, var(--bg)); color: var(--st, var(--text-secondary)); }

    @media (max-width: 600px) {
      .content { padding: 1rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .topbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <span class="logo-name">HP Contabilidade</span>
    </div>
    <div class="card">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button class="btn btn-primary btn-full" onclick="login()">Entrar</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-screen" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">HP Contabilidade</span>
      <span class="topbar-badge" id="role-badge">Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="user-email-label" style="font-size:13px;color:var(--text-secondary);"></span>
      <button class="btn btn-ghost" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="content">

    <!-- ADMIN VIEW -->
    <div id="admin-view" class="hidden">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Clientes</div><div class="stat-value" id="count-clients">—</div></div>
        <div class="stat-card"><div class="stat-label">Arquivos enviados</div><div class="stat-value" id="count-files">—</div></div>
        <div class="stat-card"><div class="stat-label">Não lidos</div><div class="stat-value" id="count-unread">—</div></div>
      </div>

      <div class="section-title">Enviar arquivo</div>
      <div class="card upload-card">
        <div class="form-row-3" style="margin-bottom:10px;">
          <div class="field" style="margin:0;">
            <label>Cliente (e-mail)</label>
            <input id="f-client" type="email" placeholder="cliente@email.com" />
          </div>
          <div class="field" style="margin:0;">
            <label>Setor</label>
            <select id="f-setor">
              <option value="Fiscal">Fiscal</option>
              <option value="Pessoal">Pessoal</option>
              <option value="Contábil">Contábil</option>
              <option value="Financeiro">Financeiro</option>
              <option value="Avisos">Avisos</option>
            </select>
          </div>
          <div class="field" style="margin:0;">
            <label>Arquivo</label>
            <input id="f-file" type="file" style="padding:6px 10px;" />
          </div>
        </div>
        <div class="field">
          <label>Notificação para o cliente</label>
          <input id="f-note" type="text" placeholder="ex: Seu demonstrativo está pronto!" />
        </div>
        <div id="upload-error" class="error-msg hidden"></div>
        <div id="upload-success" style="font-size:13px;color:var(--green-text);background:var(--green-bg);border-radius:var(--radius);padding:8px 12px;margin-bottom:12px;" class="hidden"></div>
        <button class="btn btn-primary" onclick="uploadFile()" id="upload-btn">Enviar arquivo</button>
      </div>

      <div class="divider"></div>
      <div class="section-title">Arquivos por cliente</div>
      <div id="admin-files-list"><div class="loading">Carregando...</div></div>
    </div>

    <!-- CLIENT VIEW -->
    <div id="client-view" class="hidden">
      <div id="client-notifications"></div>
      <div class="section-title" style="margin-top:1rem;">Seus arquivos</div>
      <div class="tabs" id="setor-tabs"></div>
      <div id="client-files-list"><div class="loading">Carregando...</div></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://nacdezqdsouhxgftqaku.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY2RlenFkc291aHhnZnRxYWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODU4MjYsImV4cCI6MjA5NDg2MTgyNn0.C1eqGfu7h-oOC0ibw6hzecPsG49e6IrOXrxu0C-mOSY';
const ADMIN_EMAIL = 'rh2@hporg.cnt.br';

const SETORES = ['Todos', 'Fiscal', 'Pessoal', 'Contábil', 'Financeiro', 'Avisos'];
const SETOR_CLASS = { 'Fiscal': 'setor-fiscal', 'Pessoal': 'setor-pessoal', 'Contábil': 'setor-contabil', 'Financeiro': 'setor-financeiro', 'Avisos': 'setor-avisos' };

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let allClientFiles = [];
let activeSetor = 'Todos';

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = 'E-mail ou senha incorretos.'; errEl.classList.remove('hidden'); return; }
  currentUser = data.user;
  showApp();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('main-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

async function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  document.getElementById('user-email-label').textContent = currentUser.email;
  const isAdmin = currentUser.email === ADMIN_EMAIL;
  document.getElementById('role-badge').textContent = isAdmin ? 'Admin' : 'Cliente';
  if (isAdmin) {
    document.getElementById('admin-view').classList.remove('hidden');
    document.getElementById('client-view').classList.add('hidden');
    loadAdminView();
  } else {
    document.getElementById('client-view').classList.remove('hidden');
    document.getElementById('admin-view').classList.add('hidden');
    loadClientView();
  }
}

// ── ADMIN ─────────────────────────────────────────────
async function loadAdminView() {
  const { data: files } = await sb.from('notificacoes').select('*').order('criado_em', { ascending: false });
  if (!files) return;
  const unread = files.filter(f => !f.lido).length;
  document.getElementById('count-files').textContent = files.length;
  document.getElementById('count-unread').textContent = unread;
  const byClient = {};
  files.forEach(f => {
    if (!byClient[f.cliente_email]) byClient[f.cliente_email] = [];
    byClient[f.cliente_email].push(f);
  });
  const clientEmails = Object.keys(byClient);
  document.getElementById('count-clients').textContent = clientEmails.length;
  const container = document.getElementById('admin-files-list');
  if (files.length === 0) { container.innerHTML = '<div class="empty-state">Nenhum arquivo enviado ainda.</div>'; return; }
  container.innerHTML = clientEmails.map(email => {
    const initials = email.slice(0,2).toUpperCase();
    const clientFiles = byClient[email];
    return `<div class="client-section">
      <div class="client-header">
        <div class="avatar">${initials}</div>
        <div><div class="client-name">${email}</div><div class="client-email">${clientFiles.length} arquivo(s)</div></div>
      </div>
      ${clientFiles.map(f => {
        const sc = SETOR_CLASS[f.setor] || '';
        return `<div class="file-row" id="row-${f.id}">
          <div class="file-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div class="file-info">
            <div class="file-name">${f.arquivo_nome}</div>
            <div class="file-meta">${formatDate(f.criado_em)} · ${f.lido ? 'Visualizado' : 'Não lido'}</div>
          </div>
          ${f.setor ? `<span class="setor-badge ${sc}">${f.setor}</span>` : ''}
          <span class="badge ${f.lido ? 'badge-read' : 'badge-new'}">${f.lido ? 'Visto' : 'Novo'}</span>
          <button class="btn-delete" onclick="deleteFile('${f.id}','${f.arquivo_path}')" title="Excluir">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

async function uploadFile() {
  const clientEmail = document.getElementById('f-client').value.trim();
  const fileInput   = document.getElementById('f-file');
  const note        = document.getElementById('f-note').value.trim();
  const setor       = document.getElementById('f-setor').value;
  const errEl = document.getElementById('upload-error');
  const okEl  = document.getElementById('upload-success');
  const btn   = document.getElementById('upload-btn');
  errEl.classList.add('hidden'); okEl.classList.add('hidden');
  if (!clientEmail || !fileInput.files[0]) {
    errEl.textContent = 'Preencha o e-mail do cliente e selecione um arquivo.';
    errEl.classList.remove('hidden'); return;
  }
  const file = fileInput.files[0];
  const path = `${clientEmail}/${setor}/${Date.now()}_${file.name}`;
  btn.textContent = 'Enviando...'; btn.disabled = true;
  const { error: uploadErr } = await sb.storage.from('arquivos').upload(path, file);
  if (uploadErr) {
    errEl.textContent = 'Erro ao enviar arquivo: ' + uploadErr.message;
    errEl.classList.remove('hidden'); btn.textContent = 'Enviar arquivo'; btn.disabled = false; return;
  }
  const { error: dbErr } = await sb.from('notificacoes').insert({
    cliente_email: clientEmail, arquivo_nome: file.name, arquivo_path: path,
    mensagem: note || `Novo arquivo disponível em ${setor}: ${file.name}`,
    setor: setor, lido: false, criado_em: new Date().toISOString(),
  });
  if (dbErr) {
    errEl.textContent = 'Erro ao salvar registro: ' + dbErr.message;
    errEl.classList.remove('hidden');
  } else {
    okEl.textContent = `✓ Arquivo "${file.name}" enviado para ${clientEmail} (${setor})!`;
    okEl.classList.remove('hidden');
    fileInput.value = ''; document.getElementById('f-client').value = ''; document.getElementById('f-note').value = '';
    loadAdminView();
  }
  btn.textContent = 'Enviar arquivo'; btn.disabled = false;
}

async function deleteFile(id, path) {
  if (!confirm('Excluir este arquivo?')) return;
  await sb.storage.from('arquivos').remove([path]);
  await sb.from('notificacoes').delete().eq('id', id);
  document.getElementById('row-' + id)?.remove();
  loadAdminView();
}

// ── CLIENT ────────────────────────────────────────────
async function loadClientView() {
  const email = currentUser.email;
  const { data: files } = await sb.from('notificacoes').select('*').eq('cliente_email', email).order('criado_em', { ascending: false });
  if (!files) return;
  allClientFiles = files;
  activeSetor = 'Todos';

  const newFiles = files.filter(f => !f.lido);
  const notifEl = document.getElementById('client-notifications');
  notifEl.innerHTML = newFiles.map(f => `
    <div class="notif-banner">
      <div class="notif-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <span>${f.mensagem}</span>
    </div>`).join('');

  renderTabs();
  renderClientFiles();
}

function renderTabs() {
  const tabsEl = document.getElementById('setor-tabs');
  const setoresPresentes = ['Todos', ...new Set(allClientFiles.map(f => f.setor).filter(Boolean))];
  tabsEl.innerHTML = setoresPresentes.map(s => {
    const count = s === 'Todos' ? allClientFiles.length : allClientFiles.filter(f => f.setor === s).length;
    const isActive = s === activeSetor;
    return `<button class="tab-btn ${isActive ? 'active' : ''}" onclick="selectSetor('${s}')">
      ${s} <span class="tab-count">${count}</span>
    </button>`;
  }).join('');
}

function selectSetor(setor) {
  activeSetor = setor;
  renderTabs();
  renderClientFiles();
}

function renderClientFiles() {
  const filtered = activeSetor === 'Todos' ? allClientFiles : allClientFiles.filter(f => f.setor === activeSetor);
  const listEl = document.getElementById('client-files-list');
  if (filtered.length === 0) { listEl.innerHTML = '<div class="empty-state">Nenhum arquivo neste setor ainda.</div>'; return; }
  const sc = SETOR_CLASS[activeSetor] || '';
  listEl.innerHTML = filtered.map(f => {
    const fsc = SETOR_CLASS[f.setor] || '';
    return `<div class="file-row">
      <div class="file-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <div class="file-info">
        <div class="file-name">${f.arquivo_nome}</div>
        <div class="file-meta">Disponível desde ${formatDate(f.criado_em)}</div>
      </div>
      ${f.setor ? `<span class="setor-badge ${fsc}">${f.setor}</span>` : ''}
      <span class="badge ${f.lido ? 'badge-read' : 'badge-new'}">${f.lido ? 'Visto' : 'Novo'}</span>
      <button class="download-btn" onclick="downloadFile('${f.id}','${f.arquivo_path}','${f.arquivo_nome}')">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Baixar
      </button>
    </div>`;
  }).join('');
}

async function downloadFile(id, path, name) {
  const { data, error } = await sb.storage.from('arquivos').download(path);
  if (error) { alert('Erro ao baixar arquivo.'); return; }
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
  await sb.from('notificacoes').update({ lido: true }).eq('id', id);
  const f = allClientFiles.find(x => x.id === id);
  if (f) f.lido = true;
  renderTabs();
  renderClientFiles();
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' });
}

sb.auth.getSession().then(({ data }) => {
  if (data.session) { currentUser = data.session.user; showApp(); }
});
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js");
  });
}
</script>
